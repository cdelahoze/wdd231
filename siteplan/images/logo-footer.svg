<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <!-- Gradiente Azul -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#002244"/>
      <stop offset="100%" stop-color="#0055A5"/>
    </linearGradient>
    
    <!-- Gradiente Verde -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A859"/>
      <stop offset="100%" stop-color="#8DC63F"/>
    </linearGradient>
  </defs>

  <!-- Isotipo (Símbolo F + C estilizado) -->
  <g transform="translate(20, 25)">
    <!-- Arc F -->
    <path d="M 40,30 A 50,50 0 0,1 110,40 L 90,65 A 25,25 0 0,0 55,60 L 55,120 L 30,120 L 30,30 Z" fill="url(#blueGrad)" />
    <rect x="55" y="70" width="40" height="18" rx="5" fill="url(#blueGrad)" />

    <!-- Arc C / Arrow (Crecimiento) -->
    <path d="M 70,130 A 50,50 0 0,1 130,70 L 115,92 A 25,25 0 0,0 80,120 L 130,120 L 130,145 L 70,145 Z" fill="url(#greenGrad)" />
    <circle cx="120" cy="45" r="10" fill="#00A859" />
  </g>

  <!-- Tipografía / Texto -->
  <g transform="translate(180, 75)">
    <!-- Título Principal -->
    <text x="0" y="20" font-family="'Montserrat', 'Arial Black', sans-serif" font-size="32" font-weight="900" fill="#002244" letter-spacing="1">
      FACATATIVÁ
    </text>
    
    <!-- Subtítulo -->
    <text x="2" y="50" font-family="'Roboto', 'Helvetica', sans-serif" font-size="18" font-weight="500" fill="#00A859" letter-spacing="3">
      CHAMBER OF COMMERCE
    </text>
    
    <!-- Línea decorativa -->
    <line x1="2" y1="62" x2="330" y2="62" stroke="#0055A5" stroke-width="2" stroke-dasharray="4,4" />
  </g>
</svg>
